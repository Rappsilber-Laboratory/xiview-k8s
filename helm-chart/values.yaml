# Base Authentication Configs
auth:
  api_key: "your_api_key_here"
  db_password: "your_secure_db_password"
  redis_password: "your_secure_redis_password"

# Ingress Network Mapping
ingress:
  enabled: true
  host: "xiview.local"
  className: "nginx"
  annotations: {}
  tls:
    enabled: false
    secretName: "xiview-tls-secret"

traefikRoute:
  enabled: false
  host: "xiview.local"
  entryPoints:
    - web
    - websecure
  middlewares: []
  annotations: {}
  tls:
    enabled: false
    secretName: "xiview-tls-secret"

# -------------------------------
# Core Microservices
# -------------------------------
xiviewFrontend:
  replicaCount: 1
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "xiview-frontend"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  
  service:
    type: ClusterIP
    port: 80

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

xiviewServer:
  replicaCount: 1
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "xiview-server"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  
  service:
    type: ClusterIP
    port: 80

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

crosslinkingApi:
  replicaCount: 1
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "crosslinking-api"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

xiviewUploadApi:
  replicaCount: 1
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "xiview-upload-api"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8090

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

mzidentmlReader:
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "mzidentml-reader"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

postgres:
  replicaCount: 1
  image:
    registry: ""
    repository: ""
    name: "postgres"
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  pullSecrets: []
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    # storageClass: "standard"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

redis:
  replicaCount: 1
  image:
    registry: ""
    repository: ""
    name: "redis"
    tag: "alpine"
    pullPolicy: IfNotPresent
  pullSecrets: []
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: false
    size: 5Gi
    accessMode: ReadWriteOnce
    # storageClass: "standard"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

cacheProxy:
  enabled: true
  image:
    registry: ""
    repository: "rappsilberlab"
    name: "cache-proxy"
    tag: "2026-04-15"
    pullPolicy: IfNotPresent
  pullSecrets: []
  ttl: 0
