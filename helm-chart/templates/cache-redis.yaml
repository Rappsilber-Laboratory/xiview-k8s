{{- if .Values.cacheProxy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-redis
  template:
    metadata:
      labels:
        app: cache-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: cache-redis-service
spec:
  selector:
    app: cache-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
{{- end -}}
