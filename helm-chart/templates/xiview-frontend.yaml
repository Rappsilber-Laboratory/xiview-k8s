apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiview-frontend
  labels:
    app: xiview-frontend
spec:
  replicas: {{ .Values.xiviewFrontend.replicaCount }}
  selector:
    matchLabels:
      app: xiview-frontend
  template:
    metadata:
      labels:
        app: xiview-frontend
    spec:
      {{- with .Values.xiviewFrontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.xiviewFrontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.xiviewFrontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: xiview-frontend
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.xiviewFrontend.image.repository }}:{{ .Values.xiviewFrontend.image.tag }}"
          imagePullPolicy: {{ .Values.xiviewFrontend.image.pullPolicy }}
          resources:
            {{- toYaml .Values.xiviewFrontend.resources | nindent 12 }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: xiview-frontend-service
spec:
  selector:
    app: xiview-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
