apiVersion: v1
kind: ConfigMap
metadata:
  name: xiview-frontend-config
data:
  config.js: |
    window.XIVIEW_CONFIG = {
      API_KEY: "{{ .Values.auth.api_key }}"
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiview-frontend
  labels:
    app: xiview-frontend
spec:
  replicas: {{ .Values.xiviewFrontend.replicaCount }}
  selector:
    matchLabels:
      app: xiview-frontend
  template:
    metadata:
      labels:
        app: xiview-frontend
    spec:
      volumes:
        - name: frontend-config
          configMap:
            name: xiview-frontend-config
      {{- with .Values.xiviewFrontend.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.xiviewFrontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.xiviewFrontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.xiviewFrontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: xiview-frontend
          image: "{{ if .Values.xiviewFrontend.image.registry }}{{ .Values.xiviewFrontend.image.registry }}/{{ end }}{{ if .Values.xiviewFrontend.image.repository }}{{ .Values.xiviewFrontend.image.repository }}/{{ end }}{{ .Values.xiviewFrontend.image.name }}:{{ .Values.xiviewFrontend.image.tag }}"
          imagePullPolicy: {{ .Values.xiviewFrontend.image.pullPolicy }}
          resources:
            {{- toYaml .Values.xiviewFrontend.resources | nindent 12 }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
              readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: xiview-frontend-service
spec:
  selector:
    app: xiview-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
