apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiview-upload-api
  labels:
    app: xiview-upload-api
spec:
  replicas: {{ .Values.xiviewUploadApi.replicaCount }}
  selector:
    matchLabels:
      app: xiview-upload-api
  template:
    metadata:
      labels:
        app: xiview-upload-api
    spec:
      volumes:
        - name: application-db-config
          configMap:
            name: crosslinking-api-config
            items:
              - key: config.ini
                path: database.ini
      {{- with .Values.xiviewUploadApi.nodeSelector }}
nodeSelector:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.xiviewUploadApi.affinity }}
affinity:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.xiviewUploadApi.tolerations }}
tolerations:
  {{- toYaml . | nindent 2 }}
{{- end }}
containers:
        - name: xiview-upload-api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.xiviewUploadApi.image.repository }}:{{ .Values.xiviewUploadApi.image.tag }}"
          imagePullPolicy: {{ .Values.xiviewUploadApi.image.pullPolicy }}