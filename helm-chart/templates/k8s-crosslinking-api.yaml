apiVersion: v1
kind: ConfigMap
metadata:
  name: crosslinking-api-config
data:
  config.ini: |
    [postgresql]
    host=postgresql-service
    database=crosslinking
    user=xiadmin
    password={{ .Values.auth.db_password }}
    port=5432

    [security]
    apikey={{ .Values.auth.api_key }}
    apiversion=v3
    apiport=8080
    xiviewbaseurl=https://xiview.org/pride

    [redis]
    host=redis-service
    port=6379
    password={{ .Values.auth.redis_password }}
    peptide_per_protein=peptide_per_protein_cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crosslinking-api
  labels:
    app: crosslinking-api
spec:
  replicas: {{ .Values.crosslinkingApi.replicaCount }}
  selector:
    matchLabels:
      app: crosslinking-api
  template:
    metadata:
      labels:
        app: crosslinking-api
    spec:
      volumes:
        - name: application-db-config
          configMap:
            name: crosslinking-api-config
            items:
              - key: config.ini
                path: database.ini
      {{- with .Values.crosslinkingApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.crosslinkingApi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.crosslinkingApi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: crosslinking-api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.crosslinkingApi.image.repository }}:{{ .Values.crosslinkingApi.image.tag }}"
          imagePullPolicy: {{ .Values.crosslinkingApi.image.pullPolicy }}