apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xiview-ingress
spec:
  rules:
    - host: xiview.your-domain.com
      http:
        paths:
          # Frontend React UI for Overviews/Uploads
          # Caught via generic Prefix to allow internal React routing mechanics
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xiview-frontend-service
                port:
                  number: 80
          # Legacy xiVIEW server explicitly reserved for visualization scripts and rendering HTML
          - path: /network.html
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /spectra.html
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /xiview.js
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /vendors.js
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /xiview-pride.css
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          # Asset prefixes for the legacy server visualization engine
          - path: /images
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /Lato
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /fontawesome
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /R
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          # Explicit hook bypassing regular /pride routing to the fastAPI uploader
          - path: /pride/ws/archive/crosslinking/v3/upload_local
            pathType: Exact
            backend:
              service:
                name: xiview-upload-api-service
                port:
                  number: 8090
          # Default EBI REST mapping towards your local backend
          - path: /pride
            pathType: Prefix
            backend:
              service:
                name: crosslinking-api-service
                port:
                  number: 8080
