{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xiview-ingress
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xiview-frontend-service
                port:
                  number: 80
          - path: /network.html
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /spectra.html
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /xiview.js
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /vendors.js
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /xiview-pride.css
            pathType: Exact
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /images
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /Lato
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /fontawesome
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /R
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: xiview-server-service
                port:
                  number: 80
          - path: /pride/ws/archive/crosslinking/v3/upload_local
            pathType: Exact
            backend:
              service:
                name: xiview-upload-api-service
                port:
                  number: 8090
          - path: /pride
            pathType: Prefix
            backend:
              service:
                name: crosslinking-api-service
                port:
                  number: 8080
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end -}}
